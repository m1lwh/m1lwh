<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>m1lwh - магазин цифровых товаров</title>
  <meta name="description" content="Витрина товаров от m1lwh – игры, услуги, аккаунты" />
  <link rel="icon" type="image/png" href="assets/favicon.jpg">
  <link rel="apple-touch-icon" href="assets/favicon.jpg">
  <meta name="theme-color" content="#0a0a12">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800;14..32,900&display=swap" rel="stylesheet">

  <style>
    /* ===== ТЁМНАЯ ФИОЛЕТОВО-ЧЁРНАЯ ТЕМА ===== */
    :root {
      --bg-primary: #0a0a12;
      --bg-glass: rgba(255,255,255,0.04);
      --bg-glass-hover: rgba(255,255,255,0.08);
      --border-glass: rgba(255,255,255,0.06);
      --border-glass-strong: rgba(255,255,255,0.12);
      --text-primary: #ece8f5;
      --text-secondary: #b0a8c8;
      --text-muted: #7a728a;
      --accent-violet: #8b6fd4;
      --accent-cyan: #30b5d0;
      --accent-gradient: linear-gradient(135deg, var(--accent-violet), var(--accent-cyan));
      --shadow-glass: 0 8px 32px rgba(0,0,0,0.7);
      --radius-card: 20px;
      --radius-btn: 60px;
      --transition-smooth: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    body.light-theme {
      --bg-primary: #18182a;
      --bg-glass: rgba(255,255,255,0.08);
      --bg-glass-hover: rgba(255,255,255,0.15);
      --border-glass: rgba(255,255,255,0.12);
      --border-glass-strong: rgba(255,255,255,0.2);
      --text-primary: #ece8f5;
      --text-secondary: #c8c0d8;
      --text-muted: #9a92aa;
      --accent-violet: #a082e8;
      --accent-cyan: #50c8e0;
      --shadow-glass: 0 8px 32px rgba(0,0,0,0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',system-ui,sans-serif;
      background: radial-gradient(ellipse at 20% 0%, rgba(139,111,212,0.12), transparent 60%),
                  radial-gradient(ellipse at 90% 10%, rgba(48,181,208,0.08), transparent 55%),
                  var(--bg-primary);
      color:var(--text-primary);
      line-height:1.6;
      min-height:100vh;
      padding:20px 0 0;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width:1200px; margin:0 auto; padding:0 20px 40px; }

    /* ===== ШАПКА ===== */
    .header {
      background:var(--bg-glass);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border-glass);
      border-radius:var(--radius-card);
      padding:20px 28px;
      margin-bottom:32px;
      box-shadow:var(--shadow-glass);
      transition:var(--transition-smooth);
    }
    .header:hover { border-color:var(--border-glass-strong); }
    .header-top {
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .brand { display:flex; align-items:center; gap:12px; }
    .brand-icon { font-size:28px; font-weight:900; background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .brand-name { font-size:24px; font-weight:900; letter-spacing:-0.5px; background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .header-controls {
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }
    .badge-date {
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 16px;
      border-radius:60px;
      background:var(--bg-glass);
      border:1px solid var(--border-glass);
      font-size:13px;
      color:var(--text-secondary);
    }
    .badge-date .dot {
      width:8px; height:8px;
      border-radius:50%;
      background:var(--accent-gradient);
      box-shadow:0 0 12px rgba(139,111,212,0.5);
      animation:pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.6; transform:scale(0.9); } }
    .lang-switch {
      display:flex;
      gap:4px;
      background:var(--bg-glass);
      border-radius:60px;
      padding:4px;
      border:1px solid var(--border-glass);
    }
    .lang-btn {
      background:transparent;
      border:none;
      padding:6px 14px;
      border-radius:60px;
      font-size:13px;
      font-weight:600;
      color:var(--text-secondary);
      cursor:pointer;
      transition:var(--transition-smooth);
    }
    .lang-btn.active {
      background:var(--accent-gradient);
      color:#0a0a12;
      box-shadow:0 4px 16px rgba(139,111,212,0.3);
    }
    .lang-btn:hover:not(.active) { background:var(--bg-glass-hover); }
    .theme-toggle {
      background:var(--bg-glass);
      border:1px solid var(--border-glass);
      border-radius:60px;
      padding:6px 12px;
      cursor:pointer;
      color:var(--text-secondary);
      font-size:18px;
      transition:var(--transition-smooth);
      display:flex;
      align-items:center;
      gap:6px;
    }
    .theme-toggle:hover { background:var(--bg-glass-hover); }

    .hero-section {
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:30px;
      margin-top:18px;
    }
    .hero-text { flex:1 1 280px; }
    .hero-text h1 {
      font-size:34px;
      font-weight:900;
      letter-spacing:-0.5px;
      margin-bottom:6px;
      background:var(--accent-gradient);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      display:inline-block;
      text-shadow:0 0 40px rgba(139,111,212,0.2);
    }
    .hero-text .sub { color:var(--text-secondary); font-size:16px; margin:0; }
    .hero-text .highlight {
      margin-top:8px;
      display:flex;
      flex-wrap:wrap;
      gap:12px 24px;
      font-size:14px;
      color:var(--text-muted);
    }
    .hero-text .highlight span { display:inline-flex; align-items:center; gap:6px; }
    .hero-gif { flex:0 0 120px; text-align:center; }
    .hero-gif img {
      width:100%; max-width:140px; height:auto;
      border-radius:16px;
      box-shadow:0 0 40px rgba(139,111,212,0.25);
      border:1px solid var(--border-glass);
      transition:var(--transition-smooth);
    }
    .hero-gif img:hover { transform:scale(1.04); box-shadow:0 0 60px rgba(139,111,212,0.4); }

    /* ===== ТАБЫ ===== */
    .tabs {
      display:flex;
      gap:6px;
      margin-bottom:28px;
      border-bottom:1px solid var(--border-glass);
      padding-bottom:4px;
      flex-wrap:wrap;
    }
    .tab-btn {
      background:transparent;
      border:none;
      padding:10px 22px;
      border-radius:60px;
      font-size:15px;
      font-weight:700;
      color:var(--text-secondary);
      cursor:pointer;
      transition:var(--transition-smooth);
      position:relative;
    }
    .tab-btn:hover { background:var(--bg-glass); color:var(--text-primary); }
    .tab-btn.active {
      background:var(--accent-gradient);
      color:#0a0a12;
      box-shadow:0 4px 20px rgba(139,111,212,0.3);
    }
    .tab-btn.active::after {
      content:'';
      position:absolute;
      bottom:-5px;
      left:20%;
      width:60%;
      height:3px;
      border-radius:10px;
      background:var(--accent-gradient);
    }

    /* ===== ПАНЕЛЬ УПРАВЛЕНИЯ ===== */
    .controls-bar {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:24px;
      align-items:center;
      justify-content:space-between;
      background:var(--bg-glass);
      backdrop-filter:blur(8px);
      border-radius:60px;
      padding:6px 12px 6px 18px;
      border:1px solid var(--border-glass);
    }
    .search-box {
      display:flex;
      align-items:center;
      gap:8px;
      flex:1 1 200px;
    }
    .search-box input {
      flex:1;
      padding:8px 12px;
      border-radius:40px;
      border:1px solid transparent;
      background:var(--bg-glass);
      color:var(--text-primary);
      font-size:14px;
      outline:none;
      transition:var(--transition-smooth);
      min-width:120px;
    }
    .search-box input:focus { border-color:var(--accent-violet); background:var(--bg-glass-hover); }
    .search-box input::placeholder { color:var(--text-muted); }
    .sort-select {
      padding:8px 14px;
      border-radius:40px;
      border:1px solid transparent;
      background:var(--bg-glass);
      color:var(--text-primary);
      font-size:14px;
      font-weight:600;
      outline:none;
      cursor:pointer;
      transition:var(--transition-smooth);
    }
    .sort-select:focus { border-color:var(--accent-violet); background:var(--bg-glass-hover); }
    .sort-select option { background:var(--bg-primary); color:var(--text-primary); }

    /* ===== СЕТКА ТОВАРОВ с перспективой для 3D-наклона ===== */
    .products-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
      gap:28px;
      perspective: 1000px;
    }

    .product-card {
      background:var(--bg-glass);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border-glass);
      border-radius:var(--radius-card);
      overflow:hidden;
      box-shadow:var(--shadow-glass);
      transition: transform 0.2s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      display:flex;
      flex-direction:column;
      position:relative;
      transform-style: preserve-3d;
      will-change: transform;
      transform: rotateX(0deg) rotateY(0deg) scale(1);
    }

    .product-card:hover {
      border-color:var(--border-glass-strong);
      background:var(--bg-glass-hover);
      box-shadow:0 20px 50px rgba(0,0,0,0.7);
      transform: scale(1.02) rotateX(0deg) rotateY(0deg); /* базовая анимация, но JS добавит свой наклон */
    }

    /* Стеклянная рамка при наведении */
    .product-card::before {
      content:'';
      position:absolute;
      inset:0;
      border-radius:var(--radius-card);
      padding:1px;
      background:var(--accent-gradient);
      -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
      opacity:0;
      transition:opacity 0.4s;
    }
    .product-card:hover::before { opacity:0.6; }

    .product-card img {
      width:100%; height:170px;
      object-fit:cover;
      background:rgba(255,255,255,0.02);
      border-bottom:1px solid var(--border-glass);
      transition:var(--transition-smooth);
    }
    .product-card:hover img { transform:scale(1.02); }

    .product-body { padding:16px 18px 20px; flex:1; display:flex; flex-direction:column; }
    .product-body h3 { font-size:17px; font-weight:800; line-height:1.25; margin-bottom:4px; color:var(--text-primary); }
    .product-body .price { font-size:22px; font-weight:900; color:var(--accent-cyan); margin:2px 0 6px; text-shadow:0 0 20px rgba(48,181,208,0.15); }
    .product-body .short-desc { font-size:13px; color:var(--text-secondary); line-height:1.4; margin-bottom:12px; flex:1; word-break:break-word; }
    .product-body .tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
    .product-body .tags span { font-size:11px; font-weight:600; background:var(--bg-glass); padding:3px 12px; border-radius:40px; border:1px solid var(--border-glass); color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.3px; }
    .product-body .tags span.auto { background:rgba(48,181,208,0.12); border-color:rgba(48,181,208,0.25); color:var(--accent-cyan); }
    .product-body .btn-group { display:flex; gap:8px; margin-top:auto; }
    .btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:10px 16px;
      border-radius:var(--radius-btn);
      font-weight:800;
      font-size:13px;
      text-decoration:none;
      border:none;
      cursor:pointer;
      transition:var(--transition-smooth);
      flex:1;
      text-align:center;
    }
    .btn-outline { background:var(--bg-glass); border:1px solid var(--border-glass); color:var(--text-primary); }
    .btn-outline:hover { background:var(--bg-glass-hover); border-color:var(--border-glass-strong); transform:scale(1.02); }
    .btn-primary { background:var(--accent-gradient); color:#0a0a12; box-shadow:0 4px 20px rgba(139,111,212,0.25); }
    .btn-primary:hover { transform:scale(1.04); box-shadow:0 6px 28px rgba(139,111,212,0.4); }

    .product-card .popular-tag {
      position:absolute;
      top:12px;
      right:12px;
      background:var(--accent-gradient);
      color:#0a0a12;
      font-size:11px;
      font-weight:900;
      padding:4px 12px;
      border-radius:40px;
      box-shadow:0 4px 16px rgba(139,111,212,0.25);
      z-index:2;
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    /* ===== МОДАЛЬНОЕ ОКНО (без блюра) ===== */
    .modal-overlay {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.85);
      z-index:2000;
      justify-content:center;
      align-items:center;
      padding:20px;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background: #12121e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-card);
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px 36px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.9);
      position: relative;
      margin: auto;
      color: var(--text-primary);
    }
    .modal-close {
      position:absolute;
      top:16px;
      right:22px;
      font-size:32px;
      background:none;
      border:none;
      color:var(--text-muted);
      cursor:pointer;
      transition:var(--transition-smooth);
      line-height:1;
    }
    .modal-close:hover { color:var(--text-primary); transform:rotate(90deg); }
    .modal h2 { font-size:26px; font-weight:900; margin:0 0 4px; padding-right:30px; color: #f0ecf5; }
    .modal-price { font-size:28px; font-weight:900; color:var(--accent-cyan); margin-bottom:12px; text-shadow:0 0 20px rgba(48,181,208,0.15); }
    .modal-meta { display:flex; flex-wrap:wrap; gap:8px 20px; font-size:14px; color:var(--text-secondary); margin-bottom:16px; }
    .modal-meta b { color:var(--text-primary); }
    .modal-full-desc {
      font-size:15px;
      line-height:1.7;
      color:#c8c4d0;
      white-space:pre-wrap;
      word-break:break-word;
      margin:12px 0 24px;
      background:rgba(255,255,255,0.04);
      padding:16px 20px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.05);
    }
    .btn-big {
      display:block;
      width:100%;
      padding:16px;
      font-size:20px;
      font-weight:900;
      text-align:center;
      border-radius:var(--radius-btn);
      background:var(--accent-gradient);
      color:#0a0a12;
      text-decoration:none;
      box-shadow:0 6px 30px rgba(139,111,212,0.3);
      transition:var(--transition-smooth);
      border:none;
      cursor:pointer;
    }
    .btn-big:hover { transform:scale(1.02); box-shadow:0 8px 40px rgba(139,111,212,0.45); }
    .btn-big.pulse { animation:pulse-buy 2s infinite; }
    @keyframes pulse-buy { 0%,100%{box-shadow:0 6px 30px rgba(139,111,212,0.3);} 50%{box-shadow:0 6px 50px rgba(139,111,212,0.5);} }

    /* ===== ОТЗЫВЫ ===== */
    .reviews-list { display:grid; gap:18px; }
    .review-item {
      background:var(--bg-glass);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border:1px solid var(--border-glass);
      border-radius:16px;
      padding:18px 22px;
      transition:var(--transition-smooth);
    }
    .review-item:hover { border-color:var(--border-glass-strong); background:var(--bg-glass-hover); transform:translateY(-2px); }
    .review-header { display:flex; flex-wrap:wrap; align-items:baseline; gap:6px 16px; margin-bottom:4px; }
    .review-header .name { font-weight:800; font-size:15px; color:var(--text-primary); }
    .review-header .name a { color:var(--accent-cyan); text-decoration:none; }
    .review-header .name a:hover { text-decoration:underline; }
    .review-header .order { color:var(--text-muted); font-size:13px; }
    .review-header .order a { color:var(--text-muted); text-decoration:none; }
    .review-header .order a:hover { color:var(--accent-cyan); }
    .review-header .date { color:var(--text-muted); font-size:12px; }
    .review-header .game { color:var(--accent-cyan); font-size:13px; font-weight:600; }
    .review-text { font-size:14px; color:var(--text-secondary); margin:4px 0 8px; }
    .review-answer { font-size:13px; color:var(--text-muted); border-left:3px solid var(--accent-violet); padding-left:14px; margin-top:6px; background:var(--bg-glass); border-radius:0 8px 8px 0; padding:6px 14px; }
    .more-link { display:inline-block; margin-top:20px; font-weight:800; color:var(--accent-cyan); text-decoration:none; border-bottom:2px solid transparent; transition:var(--transition-smooth); }
    .more-link:hover { border-bottom-color:var(--accent-cyan); opacity:0.8; }

    /* ===== FAQ ===== */
    .faq-section { margin-top:48px; }
    .faq-title { font-size:24px; font-weight:900; margin-bottom:20px; background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .faq-item {
      background:var(--bg-glass);
      border:1px solid var(--border-glass);
      border-radius:14px;
      margin-bottom:12px;
      overflow:hidden;
      transition:var(--transition-smooth);
    }
    .faq-item:hover { border-color:var(--border-glass-strong); }
    .faq-question {
      width:100%;
      padding:16px 20px;
      background:transparent;
      border:none;
      color:var(--text-primary);
      font-weight:700;
      font-size:16px;
      text-align:left;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      align-items:center;
      transition:var(--transition-smooth);
    }
    .faq-question:hover { background:var(--bg-glass-hover); }
    .faq-question .arrow { transition:transform 0.3s; font-size:18px; }
    .faq-item.open .faq-question .arrow { transform:rotate(180deg); }
    .faq-answer { padding:0 20px 16px; color:var(--text-secondary); font-size:15px; line-height:1.6; display:none; }
    .faq-item.open .faq-answer { display:block; }

    /* ===== ФУТЕР ===== */
    .footer {
      margin-top:48px;
      padding-top:24px;
      border-top:1px solid var(--border-glass);
      text-align:center;
      color:var(--text-muted);
      font-size:14px;
    }
    .footer strong { background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    /* ===== АНИМАЦИИ ===== */
    .product-card {
      animation:cardAppear 0.6s ease backwards;
    }
    .product-card:nth-child(1) { animation-delay:0.05s; }
    .product-card:nth-child(2) { animation-delay:0.10s; }
    .product-card:nth-child(3) { animation-delay:0.15s; }
    .product-card:nth-child(4) { animation-delay:0.20s; }
    .product-card:nth-child(5) { animation-delay:0.25s; }
    .product-card:nth-child(6) { animation-delay:0.30s; }
    .product-card:nth-child(7) { animation-delay:0.35s; }
    .product-card:nth-child(8) { animation-delay:0.40s; }
    .product-card:nth-child(9) { animation-delay:0.45s; }
    .product-card:nth-child(10) { animation-delay:0.50s; }
    .product-card:nth-child(11) { animation-delay:0.55s; }
    .product-card:nth-child(12) { animation-delay:0.60s; }
    .product-card:nth-child(13) { animation-delay:0.65s; }
    .product-card:nth-child(14) { animation-delay:0.70s; }
    .product-card:nth-child(15) { animation-delay:0.75s; }
    @keyframes cardAppear { from{opacity:0;transform:translateY(30px) scale(0.96);} to{opacity:1;transform:translateY(0) scale(1);} }

    .product-card::after {
      content:'';
      position:absolute;
      top:-50%;
      left:-50%;
      width:200%;
      height:200%;
      background:radial-gradient(circle at 30% 40%, rgba(255,255,255,0.03), transparent 70%);
      pointer-events:none;
      opacity:0;
      transition:opacity 0.6s;
    }
    .product-card:hover::after { opacity:1; }

    .modal::-webkit-scrollbar { width:6px; }
    .modal::-webkit-scrollbar-track { background:transparent; }
    .modal::-webkit-scrollbar-thumb { background:var(--accent-violet); border-radius:10px; }
    .modal::-webkit-scrollbar-thumb:hover { background:var(--accent-cyan); }

    @media (max-width:768px) {
      .header { padding:16px; }
      .hero-text h1 { font-size:26px; }
      .hero-gif { flex-basis:80px; }
      .products-grid { grid-template-columns:1fr 1fr; gap:16px; }
      .modal { padding:24px; margin:10px; }

    let currentLang = 'ru';

    function getText(obj, lang) {
      if (obj && typeof obj === 'object') return obj[lang] !== undefined ? obj[lang] : obj.ru || obj.en || '';
      return String(obj);
    }

    function getLocalizedProduct(product, lang) {
      return {
        ...product,
        name: getText(product.name, lang),
        shortDesc: getText(product.shortDesc, lang),
        fullDesc: getText(product.fullDesc, lang),
        type: getText(product.type, lang)
      };
    }

    function updatePageTexts(lang) {
      document.querySelectorAll('.lang-text').forEach(el => {
        const ru = el.getAttribute('data-lang-ru');
        const en = el.getAttribute('data-lang-en');
        if (ru && en) el.textContent = lang === 'ru' ? ru : en;
      });
      document.querySelectorAll('input[data-lang-ru-placeholder]').forEach(input => {
        const ru = input.getAttribute('data-lang-ru-placeholder');
        const en = input.getAttribute('data-lang-en-placeholder');
        if (ru && en) input.placeholder = lang === 'ru' ? ru : en;
      });
      document.querySelectorAll('.sort-select option').forEach(opt => {
        const ru = opt.getAttribute('data-lang-ru');
        const en = opt.getAttribute('data-lang-en');
        if (ru && en) opt.textContent = lang === 'ru' ? ru : en;
      });
    }

    function renderProducts(containerId, filterPopular = false) {
      const container = document.getElementById(containerId);
      if (!container) return;

      let list = filterPopular ? productsData.filter(p => p.popular) : [...productsData];

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        list = list.filter(p => {
          const localized = getLocalizedProduct(p, currentLang);
          return localized.name.toLowerCase().includes(q) ||
                 localized.shortDesc.toLowerCase().includes(q) ||
                 localized.fullDesc.toLowerCase().includes(q);
        });
      }

      if (currentSort === 'price-asc') list.sort((a,b) => a.price - b.price);
      else if (currentSort === 'price-desc') list.sort((a,b) => b.price - a.price);

      if (list.length === 0) {
        container.innerHTML = `<p style="color:var(--text-muted);padding:20px;">${currentLang === 'ru' ? 'Товаров не найдено' : 'No products found'}</p>`;
        return;

      let html = '';

        html += `
          <div class="product-card" data-product-id="${p.id}" style="animation-delay: ${(index * 0.05).toFixed(2)}s">
            ${popularBadge}
            <img src="assets/products/${p.image}" alt="${localized.name}" loading="lazy" onerror="this.src='assets/placeholder.jpg'">
            <div class="product-body">
              <h3>${localized.name}</h3>
              <div class="price">${p.price} ₽</div>
              <div class="short-desc">${localized.shortDesc}</div>
              <div class="tags">
                <span>${localized.platform}</span>
                <span>${localized.type}</span>
                ${p.stock !== '∞' ? `<span>${p.stock}</span>` : ''}
                ${autoTag}
              </div>
              <div class="btn-group">
                <button class="btn btn-outline" data-product-id="${p.id}">📖 ${currentLang === 'ru' ? 'Подробнее' : 'Details'}</button>
                <a href="https://funpay.com/users/14391063/" target="_blank" rel="noopener" class="btn btn-primary">${currentLang === 'ru' ? 'Купить' : 'Buy'}</a>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;

      // ===== 3D-наклон карточек =====
      const cards = container.querySelectorAll('.product-card');
      cards.forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = ((y - centerY) / centerY) * -8; // максимум ±8 градусов
          const rotateY = ((x - centerX) / centerX) * 8;
          card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
        });
      });

      // Обработчики для кнопок "Подробнее"
      container.querySelectorAll('[data-product-id]').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = this.dataset.productId;
          const product = productsData.find(p => p.id === id);
          if (product) openModal(product);
        });
      });
    }

    function renderReviews() {
      const container = document.getElementById('reviews-container');

      const container = document.getElementById('faqContainer');
      if (!container) return;
      let html = '';
      faqData.forEach((item, index) => {
        html += `

        const btn = item.querySelector('.faq-question');
        btn.addEventListener('click', function() {
          this.closest('.faq-item').classList.toggle('open');

    function openModal(product) {
      const modal = document.getElementById('modal');
      const localized = getLocalizedProduct(product, currentLang);
      document.getElementById('modal-title').textContent = localized.name;
      document.getElementById('modal-price').textContent = product.price + ' ₽';
      document.getElementById('modal-meta').innerHTML = `
        <span><b>${currentLang === 'ru' ? 'Платформа' : 'Platform'}:</b> ${localized.platform}</span>
        <span><b>${currentLang === 'ru' ? 'Тип' : 'Type'}:</b> ${localized.type}</span>
        <span><b>${currentLang === 'ru' ? 'Наличие' : 'Stock'}:</b> ${product.stock}</span>
        ${product.autoDelivery ? '<span>⚡ ' + (currentLang === 'ru' ? 'Автовыдача' : 'Auto delivery') + '</span>' : ''}
      `;
      document.getElementById('modal-desc').textContent = localized.fullDesc;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    function setLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      updatePageTexts(lang);
      renderAll();
    }

    function toggleTheme() {
      document.body.classList.toggle('light-theme');
      document.getElementById('themeIcon').textContent = document.body.classList.contains('light-theme') ? '☀️' : '🌙';
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
      });
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.toggle('active', content.id === 'tab-' + tabId);
      });
      if (tabId !== 'faq') renderAll();
    }

    function updateSearch(query) {
      searchQuery = query;
      renderAll();
    }

    function updateSort(sort) {
      currentSort = sort;
      renderAll();
    }

    function renderAll() {
      renderProducts('popular-grid', true);
      renderProducts('all-grid', false);
      renderReviews();
      renderFAQ();
    }

    document.addEventListener('DOMContentLoaded', function() {
      setLanguage('ru');

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          setLanguage(this.dataset.lang);
        });
      });

      document.getElementById('themeToggle').addEventListener('click', toggleTheme);

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          switchTab(this.dataset.tab);
        });
      });

      ['searchInput', 'searchInputAll'].forEach(id => {
        const input = document.getElementById(id);
        if (input) input.addEventListener('input', function(e) { updateSearch(e.target.value); });
      });

      ['sortSelect', 'sortSelectAll'].forEach(id => {
        const select = document.getElementById(id);
        if (select) select.addEventListener('change', function(e) { updateSort(e.target.value); });
      });

      renderAll();
    });

    console.log('✅ Сайт обновлён: только нужные отзывы, большие описания, 3D-наклон, фиолетово-чёрный дизайн.');
