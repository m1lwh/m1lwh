    // ===== ОТРИСОВКА КАРТОЧЕК =====
    function renderProducts(containerId, filterPopular = false) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const list = filterPopular ? products.filter(p => p.popular) : products;
      container.innerHTML = list.map(p => `
        <div class="product-card">
          <img src="assets/products/${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='assets/placeholder.jpg'">
          <div class="product-body">
            <h3>${p.name}</h3>
            <div class="price">${p.price} ₽</div>
            <div class="short-desc">${p.shortDesc}</div>
            <div class="tags">
              <span>${p.platform}</span>
              <span>${p.type}</span>
              ${p.stock !== '∞' ? `<span>${p.stock}</span>` : ''}
              ${p.autoDelivery ? '<span>⚡Автовыдача</span>' : ''}
            </div>
            <div class="btn-group">
              <button class="btn btn-outline" data-product-id="${p.id}">📖 Подробнее</button>
              <a href="https://funpay.com/users/14391063/" target="_blank" rel="noopener" class="btn btn-primary">Купить</a>
            </div>
          </div>
        </div>
      `).join('');

      // Обработчики для кнопок "Подробнее"
      container.querySelectorAll('[data-product-id]').forEach(btn => {
        btn.addEventListener('click', function() {
          const id = this.dataset.productId;
          const product = products.find(p => p.id === id);
          if (product) openModal(product);
        });
      });
    }

    // ===== МОДАЛЬНОЕ ОКНО =====
    function openModal(product) {
      document.getElementById('modal-title').textContent = product.name;
      document.getElementById('modal-price').textContent = product.price + ' ₽';
      document.getElementById('modal-meta').innerHTML = `
        <span><b>Платформа:</b> ${product.platform}</span>
        <span><b>Тип:</b> ${product.type}</span>
        <span><b>Наличие:</b> ${product.stock}</span>
        ${product.autoDelivery ? '<span>⚡ Автовыдача</span>' : ''}
      `;
      document.getElementById('modal-desc').textContent = product.fullDesc;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // ===== ОТРИСОВКА ОТЗЫВОВ =====
    function renderReviews() {
      const container = document.getElementById('reviews-container');
      container.innerHTML = reviews.map(r => `
        <div class="review-item">
          <div class="review-header">
            <span class="name">${r.name}</span>
            <span class="order">Заказ #${r.order}</span>
            <span class="date">${r.date} (${r.days})</span>
            <span style="color:#9ca3af;font-size:13px;">${r.game} • ${r.amount}</span>
          </div>
          <div class="review-text">${r.text}</div>
          <div class="review-answer">Ответ продавца: ${r.answer}</div>
        </div>
      `).join('');
    }

    // ===== ТАБЫ =====
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = {
      popular: document.getElementById('tab-popular'),
      all: document.getElementById('tab-all'),
      reviews: document.getElementById('tab-reviews')
    };

    tabBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        tabBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        Object.keys(tabContents).forEach(key => {
          tabContents[key].classList.toggle('active', key === tab);
        });
        // Если переключились на reviews – ничего не надо, уже отрисовано
      });
    });

    // (оставляем для совместимости, но тексты на русском)
    document.getElementById('btn-ru').addEventListener('click', function() {
      this.classList.add('active');
      document.getElementById('btn-en').classList.remove('active');
    });

      document.getElementById('btn-ru').classList.remove('active');
